name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
        type: string
      prerelease:
        description: 'Prerelease?'
        required: true
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Build
      run: |
        cd src
        dotnet build main.csproj -c Release
        dotnet publish main.csproj -c Release -o ../publish
    
    - name: Package
      run: |
        cd publish
        zip -r ../CSharpToHtmlCli-${{ inputs.version }}.zip .
    
    - name: Tag and Release
      uses: ncipollo/release-action@v1
      with:
        tag: v${{ inputs.version }}
        name: Release v${{ inputs.version }}
        prerelease: ${{ inputs.prerelease }}
        artifacts: "CSharpToHtmlCli-${{ inputs.version }}.zip"
        generateReleaseNotes: true
        token: ${{ secrets.GITHUB_TOKEN }}
