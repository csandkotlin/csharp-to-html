name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Build
      run: |
        cd src
        dotnet build main.csproj --configuration Release
    
    - name: Test CLI
      run: |
        cd src
        echo 'class Test { static void Main() { System.Console.WriteLine("Hello"); } }' > temp.cs
        dotnet run --project main.csproj -- /convert temp.cs
        if [ -f "temp.html" ]; then
          echo "✅ CLI works!"
          ls -la temp.html
        else
          echo "❌ CLI failed"
          exit 1
        fi
